server {

        server_name lubel.me www.lubel.me;

        # Doc root
        root /srv/www/htdocs;
        index index.html index.htm;

        # Logging
        access_log /var/log/nginx/lubel.me-access.log;
        error_log /var/log/nginx/lubel.me-error.log;

        # Solar Dashboard API - proxy to Node.js backend
        location /solar/api/ {
                proxy_pass http://localhost:3000/api/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                
                # Timeouts
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
        }

        # Solar Dashboard Frontend - static files
        location /solar/ {
                alias /srv/www/htdocs/solar/frontend/;
                try_files $uri $uri/ /solar/index.html;
                
                # Cache static assets
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                        expires 1y;
                        add_header Cache-Control "public, immutable";
                }
                
                # Don't cache HTML
                location ~* \.html$ {
                        expires -1;
                        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
                }
        }

        # Redirect /solar to /solar/
        location = /solar {
                return 301 /solar/;
        }

        # Main location
        location / {
                try_files $uri $uri/ =404;
        }

        # Security
        location ~ /\. {
                deny all;
                access_log off;
                log_not_found off;
        }

        # Let's Encrypt ACME challenge
        location ^~ /.well-known/acme-challenge/ {
                allow all;
                root /srv/www/htdocs;
        }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lubel.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lubel.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.lubel.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = lubel.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        listen [::]:80;

        server_name lubel.me www.lubel.me;
    return 404; # managed by Certbot

}

